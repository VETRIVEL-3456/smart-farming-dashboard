<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial IoT | Field Telemetry Node</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #c0392b; --bg: #ecf0f1; }
        body { font-family: 'Roboto Mono', monospace; background-color: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border: 1px solid #bdc3c7; border-radius: 4px; box-shadow: 4px 4px 0px rgba(0,0,0,0.1); }
        .value { font-size: 2.5rem; font-weight: bold; margin: 10px 0; color: var(--accent); }
        .status-bar { padding: 10px; font-weight: bold; text-transform: uppercase; border-radius: 2px; font-size: 0.8rem; text-align: center; }
        .online { background: #d4efdf; color: #1b5e20; }
        .offline { background: #fadbd8; color: #78281f; }
        .chart-container { height: 250px; margin-top: 15px; }
        h3 { margin-top: 0; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1 style="margin:0;">IOT_FIELD_NODE_01</h1>
            <small>LOCATION: TRICHY, TN | PROTOCOL: HTTPS/REST</small>
        </div>
        <div id="conn-status" class="status-bar offline">SYSTEM_OFFLINE</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Soil Moisture Index</h3>
            <div class="value" id="soil-val">--%</div>
            <div class="chart-container"><canvas id="soilChart"></canvas></div>
        </div>

        <div class="card">
            <h3>Atmospheric Conditions</h3>
            <div style="margin-top:20px;">
                <p>TEMPERATURE: <span class="value" style="font-size:1.5rem;" id="temp">--</span>°C</p>
                <p>HUMIDITY: <span class="value" style="font-size:1.5rem;" id="hum">--</span>%</p>
            </div>
            <div id="gas-alert" class="status-bar online" style="margin-top:40px;">AIR_QUALITY: NOMINAL</div>
        </div>

        <div class="card">
            <h3>Gas Sensor Cluster (Raw)</h3>
            <table style="width:100%; margin-top:15px; border-collapse: collapse;">
                <tr style="border-bottom: 1px solid #eee;"><td>MQ-2 (SMOKE)</td><td id="g1" style="text-align:right;">--</td></tr>
                <tr style="border-bottom: 1px solid #eee;"><td>MQ-7 (CO)</td><td id="g2" style="text-align:right;">--</td></tr>
                <tr style="border-bottom: 1px solid #eee;"><td>MQ-135 (NH3)</td><td id="g3" style="text-align:right;">--</td></tr>
            </table>
            <div style="margin-top:30px; font-size:0.7rem; color:#7f8c8d;">
                <p>NODE_ID: ESP32_TRICHY_01</p>
                <p>UPTIME: <span id="uptime">--</span></p>
            </div>
        </div>
    </div>

    <script>
        const GS_URL = "https://script.google.com/macros/s/AKfycbz0PN0oRjt8qZkqX1cGlENqegtRiigKj4dhR2oLppXqQGxGrGr1jaorpo5NV3XHqeiq/exec";
        const PROXY_URL = "https://api.allorigins.win/get?url=";
        let soilChart;

        function initChart() {
            const ctx = document.getElementById('soilChart').getContext('2d');
            soilChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'MOISTURE_%', data: [], borderColor: '#27ae60', borderWidth: 2, fill: false, tension: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 100 } } }
            });
        }

        async function fetchData() {
            try {
                const response = await fetch(PROXY_URL + encodeURIComponent(GS_URL));
                const json = await response.json();
                const data = JSON.parse(json.contents);
                
                // Update Numeric Data
                document.getElementById('soil-val').innerText = data.soil + "%";
                document.getElementById('temp').innerText = data.temp;
                document.getElementById('hum').innerText = data.hum;
                document.getElementById('g1').innerText = data.g1;
                document.getElementById('g2').innerText = data.g2;
                document.getElementById('g3').innerText = data.g3;

                // Update Chart
                const now = new Date().toLocaleTimeString();
                if (soilChart.data.labels.length > 15) { soilChart.data.labels.shift(); soilChart.data.datasets[0].data.shift(); }
                soilChart.data.labels.push(now);
                soilChart.data.datasets[0].data.push(data.soil);
                soilChart.update();

                // Gas Threshold Check
                const gasBar = document.getElementById('gas-alert');
                if(data.g1 > 1800 || data.g2 > 1800 || data.g3 > 1800) {
                    gasBar.innerText = "AIR_QUALITY: CRITICAL"; gasBar.className = "status-bar offline";
                } else {
                    gasBar.innerText = "AIR_QUALITY: NOMINAL"; gasBar.className = "status-bar online";
                }

                document.getElementById('conn-status').innerText = "SYSTEM_ONLINE";
                document.getElementById('conn-status').className = "status-bar online";
                document.getElementById('uptime').innerText = new Date().toUTCString();

            } catch (e) {
                document.getElementById('conn-status').innerText = "SYNC_ERROR";
                document.getElementById('conn-status').className = "status-bar offline";
            }
        }

        document.addEventListener('DOMContentLoaded', () => { initChart(); fetchData(); setInterval(fetchData, 15000); });
    </script>
</body>
</html>
