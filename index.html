<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-IoT Smart Farm Node</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌾 Green AI Agriculture Node</h1>
            <p id="live-time"></p>
        </header>

        <div class="main-grid">
            <section class="card monitoring">
                <h3>Live Field Data</h3>
                <div class="data-row">
                    <div class="data-box"><span>Temp</span><h2 id="temp">--</h2><small>°C</small></div>
                    <div class="data-box"><span>Humidity</span><h2 id="hum">--</h2><small>%</small></div>
                    <div class="data-box"><span>Soil</span><h2 id="soil">--</h2><small>%</small></div>
                </div>
                <div id="gas-warning" class="safe">Air Quality: Safe</div>
            </section>

            <section class="card strategy">
                <h3>Farm Milestone Tracker</h3>
                <input type="text" id="plant-type" placeholder="Plant (e.g., Rice)">
                <input type="date" id="seed-date">
                <input type="text" id="pincode" placeholder="Pincode">
                <button onclick="setMilestone()">Set Growth Strategy</button>
                <div id="milestone-output"></div>
            </section>
        </div>

        <section class="card ai-chat">
            <h3>🤖 Gemini Agricultural Advisor</h3>
            <select id="lang"><option value="English">English</option><option value="Tamil">Tamil</option></select>
            <div id="chat-history"></div>
            <div class="input-group">
                <input type="text" id="user-query" placeholder="Ask about nutrients, harvest, or soil health...">
                <button onclick="askGemini()">Consult AI</button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
