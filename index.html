<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>GreenNode AI Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #27ae60; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); display: flex; margin: 0; height: 100vh; }
        .sidebar { width: 280px; background: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .status-pill { padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .safe { background: #e8f5e9; color: #2e7d32; }
        .danger { background: #ffebee; color: #c62828; }
        #chat-stream { height: 200px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--primary);">🌿 GreenNode AI</h2>
        <div class="card">
            <h4>Crop Lifecycle</h4>
            <select id="plant-type" style="width: 100%;"><option value="Rice">Rice</option></select>
            <button onclick="updateDashboard()" style="margin-top: 10px; width: 100%;">Sync Manual</button>
        </div>
    </div>
    <div class="main">
        <div style="display: flex; justify-content: space-between;">
            <h2>Field Analytics</h2>
            <div id="connection-status" class="status-pill safe">Live Syncing</div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
            <div class="card"><h3>Soil Moisture</h3><h1 id="soil-val">--%</h1><canvas id="soilChart" height="100"></canvas></div>
            <div class="card"><h3>Atmosphere</h3><p>Temp: <b id="temp">--</b>°C</p><p>Hum: <b id="hum">--</b>%</p></div>
            <div class="card"><h3>Safety</h3><div id="gas-status" class="status-pill safe">Air: Safe</div></div>
        </div>
        <div class="card">
            <h3>🤖 Gemini AI Strategic Advisor</h3>
            <div id="chat-stream"></div>
            <input type="text" id="user-input" placeholder="Ask Gemini..." style="width: 70%; padding: 10px;">
            <button onclick="askGemini()" style="padding: 10px 20px;">Ask</button>
        </div>
    </div>
    <script>
        async function updateDashboard() {
    // 1. First, make sure your URL is correct (Check if it ends with /exec)
    const GS_URL = "https://script.google.com/macros/s/AKfycbz0PN0oRjt8qZkqX1cGlENqegtRiigKj4dhR2oLppXqQGxGrGr1jaorpo5NV3XHqeiq/exec";
    
    // 2. Use a more reliable Proxy to bypass GitHub's security blocks
    const PROXY_URL = "https://api.allorigins.win/get?url=";

    try {
        const response = await fetch(PROXY_URL + encodeURIComponent(GS_URL));
        const json = await response.json();
        
        // allorigins logic: data is inside json.contents
        const data = JSON.parse(json.contents);
        
        if (data.error) throw new Error(data.error);

        // Update UI Elements
        document.getElementById('soil-val').innerText = (data.soil || "--") + "%";
        document.getElementById('temp').innerText = (data.temp || "--") + "°C";
        document.getElementById('hum').innerText = (data.hum || "--") + "%";

        // Success Indicator
        const statusPill = document.getElementById('connection-status');
        statusPill.innerText = "Live Syncing";
        statusPill.className = "status-pill safe";
        
        console.log("Sync Success:", data);

    } catch (e) {
        console.error("Sync Error Details:", e);
        const statusPill = document.getElementById('connection-status');
        statusPill.innerText = "Sync Error (CORS)";
        statusPill.className = "status-pill danger";
    }
}

        async function askGemini() {
            const query = document.getElementById('user-input').value;
            const prompt = `As an agronomist, advise on Rice with moisture ${document.getElementById('soil-val').innerText}. Question: ${query}`;
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const result = await resp.json();
            document.getElementById('chat-stream').innerHTML += `<p><b>Gemini:</b> ${result.candidates[0].content.parts[0].text}</p>`;
        }
        setInterval(updateDashboard, 15000);
        updateDashboard();
    </script>
</body>
</html>
