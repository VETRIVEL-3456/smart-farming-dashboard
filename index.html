<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>Green AI Agriculture Node | Premium Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2ecc71; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 300px; background: white; height: 100vh; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .glass-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8); }
        .ai-chat-box { height: 300px; background: #fff; border-radius: 15px; display: flex; flex-direction: column; }
        #chat-stream { flex: 1; overflow-y: auto; padding: 15px; border-bottom: 1px solid #eee; }
        .input-area { padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .chart-container { height: 250px; width: 100%; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--primary);">🌾 GreenNode AI</h2>
        <div class="glass-card">
            <h4>Growth Strategy</h4>
            <label>Current Crop:</label>
            <select id="plant-type" style="width: 100%; padding: 8px; margin: 10px 0;">
                <option value="Tomato">Tomato (தக்காளி)</option>
                <option value="Rice">Rice (நெல்)</option>
                <option value="Wheat">Wheat (கோதுமை)</option>
            </select>
            <label>Seeding Date:</label>
            <input type="date" id="seed-date" style="width: 90%;">
            <button onclick="updateStrategy()" style="margin-top: 15px; width: 100%;">Set Milestone</button>
        </div>
        <div id="milestone-log" style="margin-top: 20px; font-size: 0.9rem; color: #666;"></div>
    </div>

    <div class="main-content">
        <div class="stat-grid">
            <div class="glass-card"><h3>Soil Moisture</h3><h1 id="soil-val" style="color: #3498db;">--%</h1><div class="chart-container"><canvas id="soilChart"></canvas></div></div>
            <div class="glass-card"><h3>Environment</h3><p>Temp: <span id="temp-val">--</span>°C</p><p>Humidity: <span id="hum-val">--</span>%</p></div>
            <div class="glass-card"><h3>Safety Alert</h3><div id="gas-indicator" style="padding: 20px; border-radius: 10px; text-align: center; background: #e8f5e9; color: #2e7d32;">System Safe</div></div>
        </div>

        <div class="glass-card ai-chat-box">
            <h4 style="margin: 0 0 10px 0;">🤖 Gemini AI Agronomist</h4>
            <div id="chat-stream"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask about NPK nutrients or harvesting...">
                <button onclick="askGemini()">Consult AI</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyCL6CcK13qZDPUyItfkY2Rnt5BxYLpCcUc";
        const GS_URL = "https://script.google.com/macros/s/AKfycbwwB34oUSDeB6sOGKGDxA0bQjEjQZfsDeU1CvhKtOKP4OZAV23uTvADppf3i8vTBiak/exec";
        
        // Initialize Chart
        const ctx = document.getElementById('soilChart').getContext('2d');
        const soilChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Moisture %', data: [], borderColor: '#3498db', tension: 0.4 }] },
            options: { maintainAspectRatio: false, scales: { y: { min: 0, max: 100 } } }
        });

        async function fetchData() {
            try {
                const res = await fetch(GS_URL);
                const data = await res.json();
                document.getElementById('soil-val').innerText = data.soil + "%";
                document.getElementById('temp-val').innerText = data.temp;
                document.getElementById('hum-val').innerText = data.hum;

                // Update Chart
                if (soilChart.data.labels.length > 10) { soilChart.data.labels.shift(); soilChart.data.datasets[0].data.shift(); }
                soilChart.data.labels.push(new Date().toLocaleTimeString());
                soilChart.data.datasets[0].data.push(data.soil);
                soilChart.update();

                // Gas Logic
                if(data.g1 > 1200) {
                    document.getElementById('gas-indicator').style.background = "#ffebee";
                    document.getElementById('gas-indicator').style.color = "#c62828";
                    document.getElementById('gas-indicator').innerText = "⚠️ DANGER: Gas Detected";
                }
            } catch (e) { console.log("Syncing..."); }
        }

        async function askGemini() {
            const query = document.getElementById('user-input').value;
            const chat = document.getElementById('chat-stream');
            chat.innerHTML += `<p><b>You:</b> ${query}</p>`;
            
            const prompt = `Act as an expert agronomist. User is growing ${document.getElementById('plant-type').value}. Current Soil Moisture is ${document.getElementById('soil-val').innerText}. Question: ${query}. Provide strategic advice and N-P-K nutrient prediction.`;

            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const result = await resp.json();
            chat.innerHTML += `<p style="color: #27ae60;"><b>Gemini:</b> ${result.candidates[0].content.parts[0].text}</p>`;
            chat.scrollTop = chat.scrollHeight;
        }

        setInterval(fetchData, 10000);
        fetchData();
    </script>
</body>
</html>
