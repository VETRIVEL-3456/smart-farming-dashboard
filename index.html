<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>GreenNode AI Agriculture | Premium Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 320px; background: white; height: 100vh; padding: 25px; box-shadow: 2px 0 15px rgba(0,0,0,0.05); }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        #chat-stream { height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 15px; background: #fafafa; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--primary);">🌿 GreenNode AI</h2>
        <div class="card">
            <h4>Crop Milestone</h4>
            <select id="plant-type"><option value="Rice">Rice (நெல்)</option><option value="Tomato">Tomato (தக்காளி)</option></select>
            <input type="date" id="seed-date">
            <button onclick="setMilestone()">Update Strategy</button>
            <p id="milestone-log" style="font-size: 0.85rem; color: #666;"></p>
        </div>
    </div>

    <div class="main">
        <div class="stat-grid">
            <div class="card"><h3>Soil Moisture</h3><h1 id="soil-disp" style="color: #2980b9;">--%</h1><canvas id="soilChart" height="150"></canvas></div>
            <div class="card"><h3>Environment</h3><p>Temp: <span id="temp-disp">--</span>°C</p><p>Humidity: <span id="hum-disp">--</span>%</p></div>
            <div class="card"><h3>Safety System</h3><div id="gas-alert" style="padding: 15px; border-radius: 8px; text-align: center; background: #e8f5e9; color: #27ae60;">System Safe</div></div>
        </div>

        <div class="card">
            <h3>🤖 Gemini AI Agronomist</h3>
            <div id="chat-stream"></div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="user-msg" placeholder="Ask about NPK or Harvest...">
                <button onclick="askGemini()" style="width: 150px;">Consult</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyCL6CcK13qZDPUyItfkY2Rnt5BxYLpCcUc";
        const GS_URL = "https://script.google.com/macros/s/AKfycbzwAVWG8PNHNN9ooLjer1y2DOWUyzhcpAd9RELimWofaCEvpr5shiuo-AmGodhyDR93/exec";
        
        // Chart Initialization
        let ctx = document.getElementById('soilChart').getContext('2d');
        let soilChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: '%', data: [], borderColor: '#2980b9', tension: 0.4 }] },
            options: { scales: { y: { min: 0, max: 100 } } }
        });

        async function updateData() {
            try {
                const res = await fetch(GS_URL);
                const data = await res.json();
                document.getElementById('soil-disp').innerText = data.soil + "%";
                document.getElementById('temp-disp').innerText = data.temp;
                document.getElementById('hum-disp').innerText = data.hum;

                if(soilChart.data.labels.length > 10) { soilChart.data.labels.shift(); soilChart.data.datasets[0].data.shift(); }
                soilChart.data.labels.push(new Date().toLocaleTimeString([], {minute:'2-digit', second:'2-digit'}));
                soilChart.data.datasets[0].data.push(data.soil);
                soilChart.update();

                if(data.g1 > 1500) { document.getElementById('gas-alert').style.background = "#ffdada"; document.getElementById('gas-alert').innerText = "⚠️ Gas Detected"; }
            } catch (e) { console.log("Waiting for data..."); }
        }

        async function askGemini() {
            const msg = document.getElementById('user-msg').value;
            const chat = document.getElementById('chat-stream');
            chat.innerHTML += `<p><b>You:</b> ${msg}</p>`;
            
            const prompt = `As an expert farmer, answer: ${msg}. Context: Growing ${document.getElementById('plant-type').value}, Soil Moisture: ${document.getElementById('soil-disp').innerText}. Provide NPK advice.`;
            
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const result = await resp.json();
            chat.innerHTML += `<p style="color: #27ae60;"><b>Gemini:</b> ${result.candidates[0].content.parts[0].text}</p>`;
            chat.scrollTop = chat.scrollHeight;
        }

        setInterval(updateData, 10000);
        updateData();
    </script>
</body>
</html>
